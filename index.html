<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaySplitz - Split Expenses with Friends</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        purple: {
                            50: '#faf5ff',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            800: '#5b21b6',
                            900: '#4c1d95',
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-purple-50 to-purple-100 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-lg border-b-4 border-purple-500">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center py-6">
                <div class="flex items-center">
                    <div class="bg-gradient-to-r from-purple-600 to-purple-700 p-3 rounded-xl">
                        <i class="fas fa-receipt text-white text-2xl"></i>
                    </div>
                    <h1 class="ml-4 text-3xl font-bold bg-gradient-to-r from-purple-600 to-purple-800 bg-clip-text text-transparent">
                        PaySplitz
                    </h1>
                </div>
                <div class="text-sm text-gray-600">
                    Split expenses, settle easy
                </div>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Left Panel - Friends & Groups -->
            <div class="lg:col-span-1">
                <!-- Add Friend Card -->
                <div class="bg-white rounded-2xl shadow-lg p-6 mb-6 border border-purple-100">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4 flex items-center">
                        <i class="fas fa-user-plus text-purple-600 mr-2"></i>
                        Add Friend
                    </h2>
                    <div class="space-y-4">
                        <input 
                            type="text" 
                            id="friendName" 
                            placeholder="Friend's name"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all"
                        >
                        <input 
                            type="text" 
                            id="friendPhone" 
                            placeholder="Phone number (for UPI)"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all"
                        >
                        <button 
                            onclick="addFriend()" 
                            class="w-full bg-gradient-to-r from-purple-600 to-purple-700 text-white py-3 rounded-lg hover:from-purple-700 hover:to-purple-800 transition-all duration-200 font-medium"
                        >
                            Add Friend
                        </button>
                    </div>
                </div>

                <!-- Friends List -->
                <div class="bg-white rounded-2xl shadow-lg p-6 border border-purple-100">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4 flex items-center">
                        <i class="fas fa-users text-purple-600 mr-2"></i>
                        Friends
                    </h2>
                    <div id="friendsList" class="space-y-3">
                        <!-- Friends will be populated here -->
                    </div>
                </div>
            </div>

            <!-- Middle Panel - Add Expense -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-2xl shadow-lg p-6 border border-purple-100">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4 flex items-center">
                        <i class="fas fa-plus-circle text-purple-600 mr-2"></i>
                        Add Expense
                    </h2>
                    <div class="space-y-4">
                        <input 
                            type="text" 
                            id="expenseDescription" 
                            placeholder="What was the expense for?"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all"
                        >
                        <input 
                            type="number" 
                            id="expenseAmount" 
                            placeholder="Amount (₹)"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all"
                        >
                        <select 
                            id="expensePaidBy" 
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all"
                        >
                            <option value="">Who paid?</option>
                        </select>
                        
                        <!-- Split Options -->
                        <div class="border-t pt-4">
                            <h3 class="font-medium text-gray-700 mb-3">Split between:</h3>
                            <div id="splitOptions" class="space-y-2">
                                <!-- Split options will be populated here -->
                            </div>
                        </div>
                        
                        <button 
                            onclick="addExpense()" 
                            class="w-full bg-gradient-to-r from-purple-600 to-purple-700 text-white py-3 rounded-lg hover:from-purple-700 hover:to-purple-800 transition-all duration-200 font-medium"
                        >
                            Add Expense
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Panel - Balances & Expenses -->
            <div class="lg:col-span-1">
                <!-- Balances -->
                <div class="bg-white rounded-2xl shadow-lg p-6 mb-6 border border-purple-100">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4 flex items-center">
                        <i class="fas fa-balance-scale text-purple-600 mr-2"></i>
                        Balances
                    </h2>
                    <div id="balancesList" class="space-y-3">
                        <!-- Balances will be populated here -->
                    </div>
                </div>

                <!-- Recent Expenses -->
                <div class="bg-white rounded-2xl shadow-lg p-6 border border-purple-100">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4 flex items-center">
                        <i class="fas fa-history text-purple-600 mr-2"></i>
                        Recent Expenses
                    </h2>
                    <div id="expensesList" class="space-y-3 max-h-96 overflow-y-auto">
                        <!-- Expenses will be populated here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Settlement Modal -->
    <div id="settlementModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-2xl p-8 max-w-md w-full mx-4 border border-purple-100">
            <h3 class="text-2xl font-bold text-gray-800 mb-6 text-center">Settle Payment</h3>
            <div id="settlementDetails" class="space-y-4 mb-6">
                <!-- Settlement details will be populated here -->
            </div>
            <div class="flex space-x-4">
                <button 
                    onclick="closeSettlementModal()" 
                    class="flex-1 bg-gray-300 text-gray-700 py-3 rounded-lg hover:bg-gray-400 transition-all duration-200 font-medium"
                >
                    Cancel
                </button>
                <button 
                    id="payWithUPI" 
                    class="flex-1 bg-gradient-to-r from-purple-600 to-purple-700 text-white py-3 rounded-lg hover:from-purple-700 hover:to-purple-800 transition-all duration-200 font-medium"
                >
                    Pay with UPI
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-4 right-4 bg-white border border-purple-200 text-gray-800 px-6 py-4 rounded-lg shadow-lg transform translate-x-full transition-transform duration-300 z-50">
        <div class="flex items-center">
            <i class="fas fa-check-circle text-green-500 mr-2"></i>
            <span id="toastMessage"></span>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
